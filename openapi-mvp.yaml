      summary: OAuth 연동 목록 조회
      description: |
        가게에 연동된 OAuth 플랫폼 목록을 반환합니다.
        `credentialsConfigured` 또는 `connected`가 true인 항목만 포함됩니다.
      operationId: listOAuthIntegrations
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/StoreIdQuery'
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OAuthConnectionStatus'
              example:
                - type: MOCK_MAP
                  credentialsConfigured: true
                  connected: false
                  clientId: oci_example
                  placeId: null
                  placeName: null
                  updatedAt: '2026-07-14T02:30:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/integrations/{type}/oauth/credentials:
    put:
      tags: [OAuth Integration]
      summary: OAuth Client Credentials 등록
      description: |
        연동 플랫폼에서 발급받은 `clientId`, `clientSecret`을 가게별로 저장합니다.
        이후 OAuth start 및 리뷰 답글 외부 발행에 사용됩니다.
      operationId: saveOAuthCredentials
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/OAuthIntegrationType'
        - $ref: '#/components/parameters/StoreIdQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthSaveCredentialsRequest'
      responses:
        '200':
          description: 저장 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthConnectionStatus'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      tags: [OAuth Integration]
      summary: OAuth Client Credentials 삭제
      description: 가게에 저장된 OAuth clientId·clientSecret을 삭제합니다.
      operationId: deleteOAuthCredentials
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/OAuthIntegrationType'
        - $ref: '#/components/parameters/StoreIdQuery'
      responses:
        '200':
          description: 삭제 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthConnectionStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/integrations/{type}/oauth/start:
    get:
      tags: [OAuth Integration]
      summary: OAuth 인증 시작 (리다이렉트)
      description: |
        연동 플랫폼 OAuth authorize URL로 `302` 리다이렉트합니다.
        **브라우저 주소창에 직접 URL을 입력하면 Authorization 헤더가 없어 401이 발생할 수 있습니다.**
        curl `-i`로 `Location` 헤더를 받아 해당 URL을 브라우저에서 여는 방식을 권장합니다.
      operationId: startOAuth
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/OAuthIntegrationType'
        - $ref: '#/components/parameters/StoreIdQuery'
      responses:
        '302':
          description: OAuth authorize URL로 리다이렉트
          headers:
            Location:
              description: OAuth authorize URL
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/integrations/{type}/oauth/callback:
    get:
      tags: [OAuth Integration]
      summary: OAuth 콜백 (공개)
      description: |
        연동 플랫폼이 authorization code를 전달하는 콜백 엔드포인트입니다. HTML 응답을 반환합니다.
        MockMap redirect URI 예시: `http://localhost:8080/api/integrations/MOCK_MAP/oauth/callback`
      operationId: oauthCallback
      security: []
      parameters:
        - $ref: '#/components/parameters/OAuthIntegrationType'
        - in: query
          name: code
          required: false
          schema:
            type: string
        - in: query
          name: state
          required: false
          schema:
            type: string
        - in: query
          name: error
          required: false
          schema:
            type: string
      responses:
        '200':
          description: 연결 완료 (HTML)
          content:
            text/html:
              schema:
                type: string
        '400':
          description: 연결 실패 (HTML)
          content:
            text/html:
              schema:
                type: string

  /api/integrations/{type}/oauth/disconnect:
    post:
      tags: [OAuth Integration]
      summary: OAuth 연결 해제
      description: 가게와 연동 플랫폼 간 OAuth 연결(access token 등)을 해제합니다.
      operationId: disconnectOAuth
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/OAuthIntegrationType'
        - $ref: '#/components/parameters/StoreIdQuery'
      responses:
        '200':
          description: 해제 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthConnectionStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'


components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: accessToken
      description: |
        `POST /v1/auth/login` 또는 `POST /v1/auth/signup` 응답의 `accessToken` 값.
        요청 헤더: `Authorization: Bearer {accessToken}`

  parameters:
    AuthorizationHeader:
      in: header
      name: Authorization
      required: true
      description: |
        인증 토큰. `POST /v1/auth/login` 또는 `POST /v1/auth/signup` 응답의 `accessToken`을
        `Bearer {accessToken}` 형식으로 전달합니다.
      schema:
        type: string
      example: Bearer cab520ff-eea5-46b4-bcc2-a2a4eea58f78
    StoreIdQuery:
      in: query
      name: storeId
      required: true
      description: 대상 가게 ID
      schema:
        type: string
        format: uuid
    OAuthIntegrationType:
      in: path
      name: type
      required: true
      description: |
        OAuth 연동 플랫폼 식별자 (`OAuthIntegrationType` enum, **대문자**).
        사용 가능한 값: `MOCK_MAP`
      schema:
        $ref: '#/components/schemas/OAuthIntegrationType'
      example: MOCK_MAP
    ContentChannelType:
      in: path
      name: type
      required: true
      description: |
        콘텐츠 게시 채널 (`ContentChannel` enum, **대문자**).
        사용 가능한 값: `INSTAGRAM`, `X`, `NAVER_BLOG`, `FACEBOOK`
      schema:
        $ref: '#/components/schemas/ContentChannel'
      example: INSTAGRAM
    StoreId:
      in: path
      name: storeId
      required: true
      schema:
        type: string
        format: uuid
    ContentId:
      in: path
      name: contentId
      required: true
      schema:
        type: string
        format: uuid
    MenuId:
      in: path
      name: menuId
      required: true
      schema:
        type: string
        format: uuid
    ReviewId:
      in: path
      name: reviewId
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    Unauthorized:
      description: 인증 필요 또는 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    Forbidden:
      description: 접근 권한 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    NotFound:
      description: 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    BadGateway:
      description: MockMap API 연동 오류
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'

  schemas:
    OAuthIntegrationType:
      type: string
      title: OAuth 연동 플랫폼 타입
      description: |
        ShopHub에서 지원하는 OAuth 연동 플랫폼 식별자입니다.
        경로 파라미터 `{type}` 및 응답 필드 `type`에 **대문자 enum 값**으로 사용됩니다.
      enum:
        - MOCK_MAP
        - X
      x-enum-varnames:
        - MOCK_MAP
        - X
      x-enum-descriptions:
        - MockMap 리뷰 조회/답글 발행 OAuth 연동
        - X OAuth 2.0 PKCE · 가게별 계정 연결
      example: MOCK_MAP

    ContentChannel:
      type: string
      title: 콘텐츠 게시 채널 (SNS)
      description: |
        콘텐츠 `channels` 필드에 사용하는 **대문자 enum**입니다.
        SNS 게시 채널만 허용합니다.
      enum:
        - INSTAGRAM
        - X
        - NAVER_BLOG
        - FACEBOOK
      x-enum-varnames:
        - INSTAGRAM
        - X
        - NAVER_BLOG
        - FACEBOOK
      x-enum-descriptions:
        - Instagram 콘텐츠/게시 연동
        - X 게시 연동
        - 네이버 블로그 게시
        - Facebook 게시
      example: INSTAGRAM

    ReviewPlatform:
      type: string
      title: 리뷰 출처 플랫폼 (지도)
      description: |
        리뷰 `platform`, `sourcePlatform` 필드에 사용하는 **대문자 enum**입니다.
        지도/리뷰 플랫폼만 허용합니다.
      enum:
        - MOCK_MAP
        - KAKAO_MAP
        - GOOGLE_MAP
        - NAVER_MAP
      x-enum-varnames:
        - MOCK_MAP
        - KAKAO_MAP
        - GOOGLE_MAP
        - NAVER_MAP
      x-enum-descriptions:
        - MockMap 리뷰 조회/답글 연동
        - 카카오맵 리뷰
        - Google Maps 리뷰
        - 네이버 지도 리뷰
      example: MOCK_MAP

    OAuthSaveCredentialsRequest:
      type: object
      required: [clientId, clientSecret]
      properties:
        clientId:
          type: string
          description: OAuth client ID
        clientSecret:
          type: string
          description: OAuth client secret

    OAuthConnectionStatus:
      type: object
      required: [type, credentialsConfigured, connected, clientId, placeId, placeName, updatedAt]
      properties:
        type:
          $ref: '#/components/schemas/OAuthIntegrationType'
        credentialsConfigured:
          type: boolean
        connected:
          type: boolean
        clientId:
          type: string
          nullable: true
        placeId:
          type: string
          nullable: true
        placeName:
          type: string
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    SignUpRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      required: [accessToken, expiresAt, user]
      properties:
        accessToken:
          type: string
        expiresAt:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/UserProfile'

    UserProfile:
      type: object
      required: [id, email, name]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string

    DashboardOverview:
      type: object
      required:
        [storeId, storeName, draftContent, suggestionCard, reviewWidget, checklistItems, recentReviews, generatedAt]
      properties:
        storeId:
          type: string
          format: uuid
        storeName:
          type: string
        draftContent:
          $ref: '#/components/schemas/DashboardDraftContent'
        suggestionCard:
          $ref: '#/components/schemas/DashboardSuggestionCard'
        reviewWidget:
          $ref: '#/components/schemas/DashboardReviewWidget'
        checklistItems:
          type: array
          items:
            $ref: '#/components/schemas/DashboardChecklistItem'
        recentReviews:
          type: array
          items:
            $ref: '#/components/schemas/DashboardRecentReviewItem'
        generatedAt:
          type: string
          format: date-time

    DashboardDraftContent:
      type: object
      required: [title, body, charCount, maxCharCount, channels]
      properties:
        title:
          type: string
        body:
          type: string
        charCount:
          type: integer
        maxCharCount:
          type: integer
        channels:
          type: array
          items:
            $ref: '#/components/schemas/ContentChannel'
          example:
            - INSTAGRAM
            - NAVER_BLOG

    DashboardSuggestionCard:
      type: object
      required: [title, message, actionLabel]
      properties:
        title:
          type: string
        message:
          type: string
        actionLabel:
          type: string

    DashboardReviewWidget:
      type: object
      required: [totalReviews, syncedRecentReviews, reviewListUrl]
      properties:
        totalReviews:
          type: integer
        syncedRecentReviews:
          type: integer
        reviewListUrl:
          type: string

    DashboardChecklistItem:
      type: object
      required: [key, title, completed]
      properties:
        key:
          type: string
        title:
          type: string
        completed:
          type: boolean

    DashboardRecentReviewItem:
      type: object
      required: [reviewId, authorName, rating, content, ageLabel]
      properties:
        reviewId:
          type: string
          format: uuid
        authorName:
          type: string
        rating:
          type: integer
        content:
          type: string
        ageLabel:
          type: string

    ContentStatus:
      type: string
      enum: [DRAFT, SCHEDULED, PUBLISHED, FAILED]

    ContentChannelPublishStatus:
      type: string
      enum: [PENDING, SUCCESS, FAILED]
      x-enum-descriptions:
        PENDING: 게시 대기
        SUCCESS: 게시 성공
        FAILED: 게시 실패

    ContentPlatformState:
      type: object
      required: [platform, status]
      properties:
        platform:
          $ref: '#/components/schemas/ContentChannel'
        status:
          $ref: '#/components/schemas/ContentChannelPublishStatus'

    ContentPlatformStatusItem:
      type: object
      required: [id, storeId, title, body, platforms, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        storeId:
          type: string
          format: uuid
        title:
          type: string
        body:
          type: string
        platforms:
          type: array
          items:
            $ref: '#/components/schemas/ContentPlatformState'
        updatedAt:
          type: string
          format: date-time

    ContentItem:
      type: object
      required: [id, storeId, title, body, channels, status, updatedAt, platforms]
      properties:
        id:
          type: string
          format: uuid
        storeId:
          type: string
          format: uuid
        title:
          type: string
        body:
          type: string
        channels:
          type: array
          items:
            $ref: '#/components/schemas/ContentChannel'
          example:
            - INSTAGRAM
            - NAVER_BLOG
        status:
          $ref: '#/components/schemas/ContentStatus'
        platforms:
          type: array
          items:
            $ref: '#/components/schemas/ContentPlatformState'
          example:
            - platform: INSTAGRAM
              status: PENDING
        updatedAt:
          type: string
          format: date-time

    PublishContentCarouselRequest:
      type: object
      required: [imageUrls]
      properties:
        imageUrls:
          type: array
          minItems: 1
          maxItems: 10
          items:
            type: string
            format: uri
          description: Instagram 등 SNS API가 접근 가능한 공개 이미지 URL 목록
          example:
            - https://picsum.photos/id/1015/1080/1080
            - https://picsum.photos/id/1016/1080/1080

    ImageUploadResponse:
      type: object
      required: [img_urls]
      properties:
        img_urls:
          type: array
          minItems: 1
          items:
            type: string
            format: uri
          description: S3에 업로드된 공개 이미지 URL 목록

    InstagramPublishResult:
      type: object
      required: [mediaId, caption, imageUrls, profileUrl, publishedAt]
      properties:
        mediaId:
          type: string
          description: Instagram Graph API에서 반환한 게시 Media ID
        caption:
          type: string
          description: AI가 생성해 게시에 사용한 캡션
        imageUrls:
          type: array
          items:
            type: string
            format: uri
          description: 게시에 사용된 공개 이미지 URL 목록
        profileUrl:
          type: string
          format: uri
          description: 게시된 Instagram 프로필 URL
        publishedAt:
          type: string
          format: date-time

    CreateContentRequest:
      type: object
      required: [title, body]
      properties:
        title:
          type: string
        body:
          type: string
        channels:
          type: array
          items:
            $ref: '#/components/schemas/ContentChannel'
          description: 미입력 시 `INSTAGRAM`이 기본값으로 사용됩니다.
          example:
            - INSTAGRAM
        img_urls:
          type: array
          minItems: 1
          maxItems: 10
          items:
            type: string
            format: uri
          description: S3 공개 이미지 URL 목록. 포함 시 channels에 지정된 플랫폼으로 즉시 게시합니다.
      example:
        title: 연남동 산책 후 들르는 커피
        body: 버터 취향시에와 모모 라떼를 추천드립니다.
        channels:
          - INSTAGRAM
        img_urls:
          - https://shophub-bucket.s3.ap-northeast-2.amazonaws.com/shophub/content/example.jpg

    SuggestContentRequest:
      type: object
      description: AI 콘텐츠 초안 추천 요청. 모든 필드는 선택입니다.
      properties:
        eventText:
          type: string
          description: 이벤트·프로모션 등 추가 맥락. 미입력 시 기본 문구로 추천합니다.
          example: 장마 기간 따뜻한 라떼 할인 이벤트

    ContentSuggestion:
      type: object
      required: [title, body, source]
      properties:
        title:
          type: string
        body:
          type: string
        source:
          type: string
          enum: [AI, TEMPLATE]
          description: 추천 결과 생성 방식 (`AI` 또는 `TEMPLATE`)
      example:
        title: 장마철 라떼 할인, 연남동 카페에서 만나요
        body: 비 오는 날 따뜻한 라떼 한 잔 어떠세요? 이번 주말까지 모모 라떼 10% 할인 중입니다.
        source: TEMPLATE

    ChangeContentStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/ContentStatus'

    CreateStoreRequest:
      type: object
      required: [name, category]
      allOf:
        - anyOf:
            - required: [address]
            - required: [neighborhood]
        - anyOf:
            - required: [toneOfVoice]
            - required: [tone]
      properties:
        name:
          type: string
          description: 가게명 (필수)
        phone:
          type: string
        introduction:
          type: string
          description: 소개글. 없으면 description으로 대체
        description:
          type: string
          description: introduction의 프론트 호환 필드
        address:
          type: string
          description: 주소. 없으면 neighborhood로 대체
        neighborhood:
          type: string
          description: address가 없을 때 대체값으로 사용
        category:
          type: string
          description: 업종 (필수)
        toneOfVoice:
          type: string
          description: tone이 없을 때 우선 사용
        tone:
          type: string
          description: toneOfVoice의 프론트 호환 필드
        hours:
          type: string
          description: "businessHours가 없을 때 파싱하는 요약 문자열 (예: 매일 10:00 - 20:00)"
        businessHours:
          type: array
          items:
            $ref: '#/components/schemas/BusinessHour'
        menu:
          type: array
          description: menuItems가 없을 때 사용하는 메뉴 이름 배열(문자열)
          items:
            type: string
        menuItems:
          type: array
          items:
            $ref: '#/components/schemas/CreateStoreMenuItemRequest'
        googlePlaceId:
          type: string
        googleReviewUrl:
          type: string

    CreateStoreMenuItemRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    StoreProfile:
      type: object
      required:
        [id, name, phone, introduction, address, category, toneOfVoice, businessHours, menuItems, googleTotalReviews, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
        introduction:
          type: string
        address:
          type: string
        category:
          type: string
        toneOfVoice:
          type: string
        businessHours:
          type: array
          items:
            $ref: '#/components/schemas/BusinessHour'
        menuItems:
          type: array
          items:
            $ref: '#/components/schemas/MenuItem'
        googlePlaceId:
          type: string
          nullable: true
        googleReviewUrl:
          type: string
          nullable: true
        googleTotalReviews:
          type: integer
        updatedAt:
          type: string
          format: date-time

    BusinessHour:
      type: object
      required: [dayOfWeek, openTime, closeTime, open]
      properties:
        dayOfWeek:
          type: string
          example: MON
        openTime:
          type: string
          example: '10:00'
        closeTime:
          type: string
          example: '21:00'
        open:
          type: boolean

    MenuItem:
      type: object
      required: [id, name, description]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string

    UpdateBasicRequest:
      type: object
      required: [name, phone, introduction, address, category, toneOfVoice]
      properties:
        name:
          type: string
        phone:
          type: string
        introduction:
          type: string
        address:
          type: string
        category:
          type: string
        toneOfVoice:
          type: string

    UpdateHoursRequest:
      type: object
      required: [businessHours]
      properties:
        businessHours:
          type: array
          items:
            $ref: '#/components/schemas/BusinessHour'

    AddMenuRequest:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
        description:
          type: string

    StoreReviewSummary:
      type: object
      required: [platform, totalReviewCount, syncedReviewCount, externalUrl]
      properties:
        platform:
          $ref: '#/components/schemas/ReviewPlatform'
        totalReviewCount:
          type: integer
        syncedReviewCount:
          type: integer
        externalUrl:
          type: string

    StoreReview:
      type: object
      required: [id, storeId, platform, authorName, rating, content, reviewedAt]
      properties:
        id:
          type: string
          format: uuid
        storeId:
          type: string
          format: uuid
        platform:
          $ref: '#/components/schemas/ReviewPlatform'
        authorName:
          type: string
        rating:
          type: integer
        content:
          type: string
        reviewedAt:
          type: string
          format: date-time
        reply:
          type: string
          nullable: true
        repliedAt:
          type: string
          format: date-time
          nullable: true

    SyncGoogleReviewsRequest:
      type: object
      properties:
        limit:
          type: integer
          default: 5
          minimum: 1

    AiDraftResponse:
      type: object
      required: [content]
      properties:
        content:
          type: string

    ReplyRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string

    ReviewInbox:
      type: object
      required: [generatedAt, summary, sources, reviews]
      properties:
        generatedAt:
          type: string
          format: date-time
        summary:
          $ref: '#/components/schemas/ReviewInboxSummary'
        sources:
          type: array
          items:
            $ref: '#/components/schemas/ReviewInboxSource'
        reviews:
          type: array
          items:
            $ref: '#/components/schemas/ReviewInboxItem'

    ReviewInboxSummary:
      type: object
      required: [totalReviews, averageRating]
      properties:
        totalReviews:
          type: integer
        averageRating:
          type: number
          format: double

    ReviewInboxSource:
      type: object
      required: [placeId, storeName]
      properties:
        placeId:
          type: string
        storeName:
          type: string
        placeRating:
          type: number
          format: double
          nullable: true
        placeRatingCount:
          type: integer
          nullable: true
        placeUrl:
          type: string
          nullable: true

    ReviewInboxItem:
      type: object
      required: [sourcePlatform, placeId, storeName, authorName, rating, content, reviewedAt]
      properties:
        sourcePlatform:
          $ref: '#/components/schemas/ReviewPlatform'
        placeId:
          type: string
        storeName:
          type: string
        authorName:
          type: string
        rating:
          type: integer
        content:
          type: string
        reviewedAt:
          type: string
          format: date-time

    ApiErrorResponse:
      type: object
      required: [code, message, timestamp]
      properties:
        code:
          type: string
        message:
          type: string
        timestamp:
          type: string
          format: date-time
