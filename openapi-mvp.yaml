openapi: 3.0.3
info:
  title: ShopHub API
  version: 0.3.0
  description: |
    현재 코드 기준 API 명세서.
    패키지 구조(domain/global/infrastructure)에 맞춰 구현된 REST API를 기술한다.

    ## 인증
    대부분의 API는 `POST /v1/auth/login` 또는 `POST /v1/auth/signup` 으로 발급받은
    `accessToken`을 `Authorization: Bearer {accessToken}` 헤더에 담아 호출한다.
    인증이 필요한 API에 토큰 없이 요청하면 `401 UNAUTHORIZED`가 반환된다.
    가게 멤버십이 필요한 API에서 권한이 없으면 `403 FORBIDDEN`이 반환된다.

    ## OAuth 연동 (`OAuthIntegrationType`)
    OAuth API 경로의 `{type}` 및 응답 필드 `type`은 **대문자 enum**을 사용합니다.
    | type | 설명 |
    |------|------|
    | `MOCK_MAP` | MockMap 리뷰 조회/답글 발행 OAuth |
    | `X` | X OAuth 2.0 PKCE · 가게별 계정 연결 |

    예시 경로: `/api/integrations/MOCK_MAP/oauth/start?storeId={storeId}`

    ## 콘텐츠 게시 채널 (`ContentChannel`)
    SNS 게시 API 경로의 `{type}`은 **대문자 enum**을 사용합니다.
    | type | 설명 |
    |------|------|
    | `INSTAGRAM` | Instagram Graph API 게시 (구현됨) |
    | `X` | X API 게시 (구현됨, OAuth 2.0 PKCE · 가게별 계정 연결) |
    | `NAVER_BLOG` | 네이버 블로그 게시 (미구현) |
    | `FACEBOOK` | Facebook Graph API 게시 (구현됨) |

    예시 경로: `POST /v1/stores/{storeId}/contents/INSTAGRAM/publish-carousel`
    요청 본문에 Instagram 등이 접근 가능한 **공개 이미지 URL**(`imageUrls`)을 전달합니다.

    ## 콘텐츠 API
    | API | 설명 |
    |-----|------|
    | `POST /v1/stores/{storeId}/contents/images` | 원본 이미지 업로드 → S3 저장 후 `img_urls` 반환 |
    | `GET /v1/stores/{storeId}/contents/platform-status` | 콘텐츠별 플랫폼 게시 상태 전체 조회 |
    | `POST /v1/stores/{storeId}/contents/suggest` | AI title/body 초안 추천 (`200`, DB 저장 없음) |
    | `POST /v1/stores/{storeId}/contents` | title/body/channels/img_urls로 콘텐츠 생성 및 채널별 SNS 게시 |
    | `POST /v1/stores/{storeId}/contents/{type}/publish-carousel` | 공개 이미지 URL로 단일 채널 SNS 게시 |
servers:
  - url: http://localhost:8080
    description: local

tags:
  - name: Auth
    description: 회원가입, 로그인, 토큰 기반 인증
  - name: Dashboard
    description: 가게 운영 현황 대시보드
  - name: Content
    description: SNS 콘텐츠 작성·이미지 업로드·게시
  - name: Store Profile
    description: 가게 프로필 및 메뉴 관리
  - name: Reviews
    description: 리뷰 조회·동기화·답글
  - name: Review Inbox
    description: MockMap Place ID 기반 통합 리뷰함
  - name: OAuth Integration
    description: MockMap·X 등 외부 플랫폼 OAuth 연동

security:
  - BearerAuth: []

paths:
  /v1/auth/signup:
    post:
      tags: [Auth]
      summary: 회원가입
      description: 이메일·비밀번호·이름으로 계정을 생성하고, 로그인 토큰을 함께 발급합니다.
      operationId: signUp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '201':
          description: 회원가입 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/auth/login:
    post:
      tags: [Auth]
      summary: 로그인
      description: 이메일과 비밀번호로 인증하고 accessToken을 발급받습니다.
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/me:
    get:
      tags: [Auth]
      summary: 현재 사용자 조회
      description: Bearer 토큰으로 인증된 사용자의 프로필을 반환합니다.
      operationId: getCurrentUser
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/auth/logout:
    post:
      tags: [Auth]
      summary: 로그아웃
      description: |
        현재 Bearer 토큰을 무효화합니다.
        Swagger에서 Authorize 후 호출하는 것을 권장합니다.
      operationId: logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      responses:
        '204':
          description: 로그아웃 성공
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/stores:
    get:
      tags: [Store Profile]
      summary: 가게 목록 조회
      description: 로그인한 사용자가 소속된 가게만 반환합니다.
      operationId: getStores
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StoreProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Store Profile]
      summary: 가게 생성
      description: |
        로그인한 사용자를 해당 가게의 OWNER 멤버로 자동 등록합니다.

        **필수 필드**
        - `name`, `category`
        - `address` 또는 `neighborhood` (둘 중 하나)
        - `toneOfVoice` 또는 `tone` (둘 중 하나)

        **프론트 온보딩 호환 alias**
        - 소개: `introduction` 또는 `description`
        - 주소: `address` 또는 `neighborhood`
        - 말투: `toneOfVoice` 또는 `tone`
        - 메뉴: `menuItems` 또는 `menu`
        - 영업시간: `businessHours` 또는 `hours`(예: `매일 11:00 - 21:00`)
      operationId: createStore
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStoreRequest'
            examples:
              minimal:
                summary: 최소 필수값
                value:
                  name: 모모커피 연남
                  category: 카페 · 디저트
                  address: 서울 마포구 동교로 242
                  toneOfVoice: 따뜻하고 담백한
              onboarding:
                summary: 프론트 온보딩 스타일
                value:
                  name: 모모커피 연남
                  phone: "02-335-0426"
                  description: 연남동 골목 카페
                  address: 서울 마포구 동교로 242
                  category: 카페 · 디저트
                  tone: 따뜻하고 담백한 동네 카페 말투
                  hours: "매일 11:00 - 21:00"
                  menu:
                    - 모모 라떼
                    - 버터 취향시에
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      responses:
        '201':
          description: 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/stores/{storeId}/dashboard:
    get:
      tags: [Dashboard]
      summary: 대시보드 조회
      description: 가게 운영 현황, 체크리스트, 최근 리뷰 등 대시보드 요약 정보를 조회합니다.
      operationId: getDashboardOverview
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/StoreId'
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardOverview'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/stores/{storeId}/contents:
    get:
      tags: [Content]
      summary: 콘텐츠 목록 조회
      description: 가게에 등록된 콘텐츠 목록을 조회합니다. status 쿼리로 초안·게시 상태를 필터링할 수 있습니다.
      operationId: getContents
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/StoreId'
        - in: query
          name: status
          required: false
          schema:
            $ref: '#/components/schemas/ContentStatus'
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContentItem'
              example:
                - id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  storeId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  title: 연남동 산책 후 들르는 커피
                  body: 버터 취향시에와 모모 라떼를 추천드립니다.
                  channels:
                    - INSTAGRAM
                    - NAVER_BLOG
                  status: DRAFT
                  platforms:
                    - platform: INSTAGRAM
                      status: PENDING
                    - platform: NAVER_BLOG
                      status: PENDING
                  updatedAt: '2026-07-14T02:47:59.002Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Content]
      summary: 콘텐츠 생성
      description: |
        제목·본문·게시 채널로 콘텐츠를 생성합니다.
        `img_urls`가 포함되면 `channels`에 지정된 각 SNS 플랫폼으로 즉시 게시를 시도합니다.
        `img_urls` 없이 호출하면 기존처럼 `DRAFT` 상태로만 저장됩니다.
      operationId: createContent
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/StoreId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContentRequest'
            example:
              title: 연남동 산책 후 들르는 커피
              body: 버터 취향시에와 모모 라떼를 추천드립니다.
              channels:
                - INSTAGRAM
              img_urls:
                - https://shophub-bucket.s3.ap-northeast-2.amazonaws.com/shophub/content/example.jpg
      responses:
        '201':
          description: 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/stores/{storeId}/contents/images:
    post:
      tags: [Content]
      summary: 이미지 업로드
      description: |
        원본 이미지 파일을 multipart/form-data로 업로드하면 S3에만 저장하고 공개 URL 목록(`img_urls`)을 반환합니다.
        반환된 URL을 `POST /contents`의 `img_urls` 또는 `publish-carousel` API의 `imageUrls`에 사용합니다.
        Instagram 기준 최소 1장, 최대 10장까지 업로드할 수 있습니다. 파일당 최대 5MB입니다.
      operationId: uploadContentImages
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/StoreId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [images]
              properties:
                images:
                  type: array
                  minItems: 1
                  maxItems: 10
                  items:
                    type: string
                    format: binary
                  description: 업로드할 원본 이미지 파일 목록
      responses:
        '200':
          description: 업로드 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageUploadResponse'
              example:
                img_urls:
                  - https://shophub-bucket.s3.ap-northeast-2.amazonaws.com/shophub/content/example.jpg
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/stores/{storeId}/contents/platform-status:
    get:
      tags: [Content]
      summary: 콘텐츠 플랫폼 게시 상태 전체 조회
      description: |
        매장의 모든 콘텐츠를 조회하고, 각 콘텐츠별 대상 플랫폼(`ContentChannel`)과
        플랫폼별 게시 상태(`PENDING`, `SUCCESS`, `FAILED`)를 함께 반환합니다.
        페이징은 지원하지 않습니다.
      operationId: getContentPlatformStatuses
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/StoreId'
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContentPlatformStatusItem'
              example:
                - id: 3034b816-757d-487f-b4c7-d1f7bea4f78f
                  storeId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  title: 비 오는 날, 따뜻한 라떼
                  body: 비 오는 오늘, 따뜻한 라떼 한 잔으로 잠깐 쉬어가세요.
                  platforms:
                    - platform: INSTAGRAM
                      status: SUCCESS
                  updatedAt: '2026-07-14T02:47:59.002Z'
                - id: c68f0630-c40e-41cc-9335-39b82773f931
                  storeId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  title: 연남동 산책 후 들르는 커피
                  body: 산책 후엔 버터 취향시에와 모모 라떼가 좋아요.
                  platforms:
                    - platform: INSTAGRAM
                      status: PENDING
                    - platform: FACEBOOK
                      status: PENDING
                  updatedAt: '2026-07-14T01:47:59.002Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/stores/{storeId}/contents/suggest:
    post:
      tags: [Content]
      summary: AI 콘텐츠 초안 추천
      description: |
        가게 프로필·운영시간·메뉴와 `eventText`를 바탕으로 title/body 초안을 추천합니다.
        DB에 콘텐츠를 저장하지 않으며, 추천 결과만 반환합니다.
      operationId: suggestContent
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/StoreId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SuggestContentRequest'
            example:
              eventText: 장마 기간 따뜻한 라떼 할인 이벤트
      responses:
        '200':
          description: 추천 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentSuggestion'
              example:
                title: 장마철 라떼 할인, 연남동 카페에서 만나요
                body: 비 오는 날 따뜻한 라떼 한 잔 어떠세요? 이번 주말까지 모모 라떼 10% 할인 중입니다.
                source: TEMPLATE
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/stores/{storeId}/contents/{contentId}/retry:
    post:
      tags: [Content]
      summary: 실패/기존 콘텐츠 다시 작성
      description: 게시 실패 등의 콘텐츠를 DRAFT 상태로 되돌려 다시 작성할 수 있게 합니다. 경로의 storeId와 콘텐츠 소유 매장이 다르면 404를 반환합니다.
      operationId: retryContent
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/StoreId'
        - $ref: '#/components/parameters/ContentId'
      responses:
        '200':
          description: 재작성 요청 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentItem'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/stores/{storeId}/contents/{contentId}/status:
    patch:
      tags: [Content]
      summary: 콘텐츠 상태 변경
      description: DRAFT, SCHEDULED, PUBLISHED 등 콘텐츠 상태를 변경합니다. 경로의 storeId와 콘텐츠 소유 매장이 다르면 404를 반환합니다.
      operationId: changeContentStatus
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/StoreId'
        - $ref: '#/components/parameters/ContentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeContentStatusRequest'
      responses:
        '200':
          description: 변경 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/stores/{storeId}/contents/{type}/publish-carousel:
    post:
      tags: [Content]
      summary: SNS 콘텐츠 이미지 게시 (1장 이상)
      description: |
        `type`은 콘텐츠 게시 채널(`ContentChannel`) **대문자 enum**입니다.
        사용 가능한 값: `INSTAGRAM`, `X`, `NAVER_BLOG`, `FACEBOOK`

        요청 본문의 `imageUrls`에 **공개 접근 가능한 이미지 URL**을 전달합니다.
        - Instagram: 1~10장
        - X: 1~4장
        가게/콘텐츠/운영시간 정보를 바탕으로 AI 캡션을 생성한 뒤 해당 채널 API로 게시합니다.
        - 1장이면 단일 이미지 게시
        - 2장 이상이면 캐러셀/멀티 이미지 게시
        - Instagram Graph API / X API는 URL에서 이미지를 직접 가져오므로, localhost 전용 URL은 사용할 수 없습니다.
        - 현재 `INSTAGRAM`, `X`, `FACEBOOK`이 구현되어 있으며, `NAVER_BLOG`는 추후 지원 예정입니다.
        - `X`는 앱 OAuth 2.0 자격증명(`.env`) 설정 후 `/api/integrations/X/oauth/start`로 가게별 X 계정을 연결합니다.
      operationId: publishContentCarousel
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/StoreId'
        - $ref: '#/components/parameters/ContentChannelType'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishContentCarouselRequest'
            example:
              imageUrls:
                - https://picsum.photos/id/1015/1080/1080
                - https://picsum.photos/id/1016/1080/1080
      responses:
        '200':
          description: 게시 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstagramPublishResult'
              example:
                mediaId: "18078386915310732"
                caption: "연남동 산책 후 들르기 좋은 카페 ☕"
                imageUrls:
                  - https://picsum.photos/id/1015/1080/1080
                  - https://picsum.photos/id/1016/1080/1080
                profileUrl: https://www.instagram.com/commentcopybot/
                publishedAt: '2026-07-14T03:00:00.000Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'

