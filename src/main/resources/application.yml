spring:
  application:
    name: ShopHub
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/shophub?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:shophub}
    password: ${SPRING_DATASOURCE_PASSWORD:shophub}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 50MB

mock-map:
  api:
    base-url: ${MOCK_MAP_API_BASE_URL:http://localhost:8000}
    health-path: ${MOCK_MAP_HEALTH_PATH:/health/}
    oauth-token-path: ${MOCK_MAP_OAUTH_TOKEN_PATH:/oauth/token/}
    reviews-path: ${MOCK_MAP_REVIEWS_PATH:/api/reviews/}
  oauth:
    client-id: ${MOCK_MAP_OAUTH_CLIENT_ID:}
    client-secret: ${MOCK_MAP_OAUTH_CLIENT_SECRET:}
    refresh-token: ${MOCK_MAP_OAUTH_REFRESH_TOKEN:}
    redirect-uri: ${MOCK_MAP_OAUTH_REDIRECT_URI:http://localhost:8080/api/integrations/MOCK_MAP/oauth/callback}
    authorize-path: ${MOCK_MAP_OAUTH_AUTHORIZE_PATH:/oauth/authorize/}
    revoke-path: ${MOCK_MAP_OAUTH_REVOKE_PATH:/oauth/revoke/}
    token-store-path: ${MOCK_MAP_OAUTH_TOKEN_STORE_PATH:./.mockmap-oauth-store.json}
    cache:
      store: ${MOCK_MAP_OAUTH_CACHE_STORE:redis}
      pending-state-ttl-seconds: ${MOCK_MAP_OAUTH_PENDING_STATE_TTL_SECONDS:600}
      pending-state-key-prefix: ${MOCK_MAP_OAUTH_PENDING_STATE_KEY_PREFIX:shophub:mockmap:oauth:pending-state:}
      access-token-key-prefix: ${MOCK_MAP_OAUTH_ACCESS_TOKEN_KEY_PREFIX:shophub:mockmap:oauth:access-token:}

open-meteo:
  geocoding-base-url: ${OPEN_METEO_GEOCODING_BASE_URL:https://geocoding-api.open-meteo.com}
  forecast-base-url: ${OPEN_METEO_FORECAST_BASE_URL:https://api.open-meteo.com}
  default-latitude: ${OPEN_METEO_DEFAULT_LATITUDE:37.5665}
  default-longitude: ${OPEN_METEO_DEFAULT_LONGITUDE:126.9780}
  timezone: ${OPEN_METEO_TIMEZONE:Asia/Seoul}

openai:
  api-key: ${OPENAI_API_KEY:}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com}
  model: ${OPENAI_MODEL:gpt-4o-mini}
  temperature: ${OPENAI_TEMPERATURE:0.7}

gemini:
  api-key: ${GEMINI_API_KEY:}
  base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
  model: ${GEMINI_MODEL:gemini-2.0-flash}
  temperature: ${GEMINI_TEMPERATURE:0.7}
  max-output-tokens: ${GEMINI_MAX_OUTPUT_TOKENS:1024}

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
  model: ${ANTHROPIC_MODEL:claude-sonnet-4-6}
  max-tokens: ${ANTHROPIC_MAX_TOKENS:1024}
  api-version: ${ANTHROPIC_API_VERSION:2023-06-01}

instagram:
  graph:
    base-url: ${INSTAGRAM_GRAPH_BASE_URL:https://graph.instagram.com/v21.0}
    account-id: ${INSTAGRAM_GRAPH_ACCOUNT_ID:17841476807685488}
    access-token: ${INSTAGRAM_GRAPH_ACCESS_TOKEN:}
    allowed-account-id: ${INSTAGRAM_GRAPH_ALLOWED_ACCOUNT_ID:17841476807685488}
    allowed-username: ${INSTAGRAM_GRAPH_ALLOWED_USERNAME:commentcopybot}
    max-attempts: ${INSTAGRAM_GRAPH_MAX_ATTEMPTS:15}
    interval-ms: ${INSTAGRAM_GRAPH_INTERVAL_MS:2000}
  oauth:
    redirect-uri: ${INSTAGRAM_OAUTH_REDIRECT_URI:http://localhost:8080/api/integrations/INSTAGRAM/oauth/callback}
    pending-state-ttl-seconds: ${INSTAGRAM_OAUTH_PENDING_STATE_TTL_SECONDS:600}

x:
  api:
    tweets-url: ${X_TWEETS_URL:https://api.x.com/2/tweets}
    media-upload-url: ${X_MEDIA_UPLOAD_URL:https://api.x.com/2/media/upload}
  oauth:
    authorize-url: ${X_OAUTH_AUTHORIZE_URL:https://twitter.com/i/oauth2/authorize}
    token-url: ${X_OAUTH_TOKEN_URL:https://api.x.com/2/oauth2/token}
    revoke-url: ${X_OAUTH_REVOKE_URL:https://api.x.com/2/oauth2/revoke}
    client-id: ${X_OAUTH_CLIENT_ID:}
    client-secret: ${X_OAUTH_CLIENT_SECRET:}
    redirect-uri: ${X_OAUTH_REDIRECT_URI:http://localhost:8080/api/integrations/X/oauth/callback}
    scope: ${X_OAUTH_SCOPE:tweet.read tweet.write users.read offline.access media.write}
    cache:
      store: ${X_OAUTH_CACHE_STORE:redis}
      pending-state-ttl-seconds: ${X_OAUTH_PENDING_STATE_TTL_SECONDS:600}
      pending-state-key-prefix: ${X_OAUTH_PENDING_STATE_KEY_PREFIX:shophub:x:oauth:pending-state:}
      access-token-key-prefix: ${X_OAUTH_ACCESS_TOKEN_KEY_PREFIX:shophub:x:oauth:access-token:}

facebook:
  graph:
    base-url: ${FACEBOOK_GRAPH_BASE_URL:https://graph.facebook.com/v21.0}
    page-id: ${FACEBOOK_GRAPH_PAGE_ID:}
    access-token: ${FACEBOOK_GRAPH_ACCESS_TOKEN:}
    allowed-page-id: ${FACEBOOK_GRAPH_ALLOWED_PAGE_ID:}
    allowed-page-name: ${FACEBOOK_GRAPH_ALLOWED_PAGE_NAME:}
  oauth:
    redirect-uri: ${FACEBOOK_OAUTH_REDIRECT_URI:http://localhost:8080/api/integrations/FACEBOOK/oauth/callback}
    pending-state-ttl-seconds: ${FACEBOOK_OAUTH_PENDING_STATE_TTL_SECONDS:600}

app:
  frontend:
    base-url: ${APP_FRONTEND_BASE_URL:http://localhost:5173}
  auth:
    session:
      store: ${APP_AUTH_SESSION_STORE:redis}
      ttl-hours: ${APP_AUTH_SESSION_TTL_HOURS:24}
      key-prefix: ${APP_AUTH_SESSION_KEY_PREFIX:shophub:auth:session:}
  review-source:
    provider: ${APP_REVIEW_SOURCE_PROVIDER:mockmap}
  review-sync:
    enabled: ${APP_REVIEW_SYNC_ENABLED:true}
    cron: ${APP_REVIEW_SYNC_CRON:0 */5 * * * *}
  storage:
    upload-dir: ${APP_STORAGE_UPLOAD_DIR:./uploads}
    public-base-url: ${PUBLIC_BASE_URL:http://localhost:8080}
    public-image-provider: ${APP_STORAGE_PUBLIC_IMAGE_PROVIDER:picsum-dev}
    s3:
      bucket: ${AWS_S3_BUCKET:}
      region: ${AWS_S3_REGION:ap-northeast-2}
      public-base-url: ${AWS_S3_PUBLIC_BASE_URL:}
      key-prefix: ${AWS_S3_KEY_PREFIX:shophub}
      access-key-id: ${AWS_ACCESS_KEY_ID:}
      secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
