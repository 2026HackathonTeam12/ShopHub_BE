spring:
  application:
    name: ShopHub
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/shophub?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:shophub}
    password: ${SPRING_DATASOURCE_PASSWORD:shophub}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

mock-map:
  api:
    base-url: ${MOCK_MAP_API_BASE_URL:http://localhost:8000}
    health-path: ${MOCK_MAP_HEALTH_PATH:/health/}
    oauth-token-path: ${MOCK_MAP_OAUTH_TOKEN_PATH:/oauth/token/}
    reviews-path: ${MOCK_MAP_REVIEWS_PATH:/api/reviews/}
  oauth:
    client-id: ${MOCK_MAP_OAUTH_CLIENT_ID:}
    client-secret: ${MOCK_MAP_OAUTH_CLIENT_SECRET:}
    refresh-token: ${MOCK_MAP_OAUTH_REFRESH_TOKEN:}
    redirect-uri: ${MOCK_MAP_OAUTH_REDIRECT_URI:http://localhost:8080/api/integrations/MOCK_MAP/oauth/callback}
    authorize-path: ${MOCK_MAP_OAUTH_AUTHORIZE_PATH:/oauth/authorize/}
    revoke-path: ${MOCK_MAP_OAUTH_REVOKE_PATH:/oauth/revoke/}
    token-store-path: ${MOCK_MAP_OAUTH_TOKEN_STORE_PATH:./.mockmap-oauth-store.json}
    cache:
      store: ${MOCK_MAP_OAUTH_CACHE_STORE:redis}
      pending-state-ttl-seconds: ${MOCK_MAP_OAUTH_PENDING_STATE_TTL_SECONDS:600}
      pending-state-key-prefix: ${MOCK_MAP_OAUTH_PENDING_STATE_KEY_PREFIX:shophub:mockmap:oauth:pending-state:}
      access-token-key-prefix: ${MOCK_MAP_OAUTH_ACCESS_TOKEN_KEY_PREFIX:shophub:mockmap:oauth:access-token:}

openai:
  api-key: ${OPENAI_API_KEY:}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com}
  model: ${OPENAI_MODEL:gpt-4o-mini}
  temperature: ${OPENAI_TEMPERATURE:0.7}

instagram:
  graph:
    base-url: ${INSTAGRAM_GRAPH_BASE_URL:https://graph.instagram.com/v21.0}
    account-id: ${INSTAGRAM_GRAPH_ACCOUNT_ID:17841476807685488}
    access-token: ${INSTAGRAM_GRAPH_ACCESS_TOKEN:}
    allowed-account-id: ${INSTAGRAM_GRAPH_ALLOWED_ACCOUNT_ID:17841476807685488}
    allowed-username: ${INSTAGRAM_GRAPH_ALLOWED_USERNAME:commentcopybot}
    max-attempts: ${INSTAGRAM_GRAPH_MAX_ATTEMPTS:15}
    interval-ms: ${INSTAGRAM_GRAPH_INTERVAL_MS:2000}

app:
  auth:
    session:
      store: ${APP_AUTH_SESSION_STORE:redis}
      ttl-hours: ${APP_AUTH_SESSION_TTL_HOURS:24}
      key-prefix: ${APP_AUTH_SESSION_KEY_PREFIX:shophub:auth:session:}
  review-source:
    provider: ${APP_REVIEW_SOURCE_PROVIDER:mockmap}
  review-sync:
    enabled: ${APP_REVIEW_SYNC_ENABLED:true}
    cron: ${APP_REVIEW_SYNC_CRON:0 */5 * * * *}
  storage:
    upload-dir: ${APP_STORAGE_UPLOAD_DIR:./uploads}
    public-base-url: ${PUBLIC_BASE_URL:http://localhost:8080}
    public-image-provider: ${APP_STORAGE_PUBLIC_IMAGE_PROVIDER:picsum-dev}
