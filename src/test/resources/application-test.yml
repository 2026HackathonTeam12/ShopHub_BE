spring:
  config:
    import: []
  datasource:
    url: jdbc:h2:mem:shophub;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.RedisRepositoriesAutoConfiguration
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

app:
  auth:
    session:
      store: memory
  review-sync:
    enabled: false
  storage:
    public-image-provider: picsum-dev

mock-map:
  oauth:
    client-id: oci_shophub_local
    client-secret: ocs_shophub_local_dev_secret
    redirect-uri: http://localhost:8080/api/integrations/MOCK_MAP/oauth/callback
    cache:
      store: memory

x:
  oauth:
    cache:
      store: memory

gemini:
  api-key:

anthropic:
  api-key:

openai:
  api-key:
