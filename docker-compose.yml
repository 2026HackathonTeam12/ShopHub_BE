services:
  mysql:
    image: mysql:${MYSQL_IMAGE_TAG:-8.4}
    container_name: shophub-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-shophub}
      MYSQL_USER: ${MYSQL_USER:-shophub}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-shophub}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      TZ: Asia/Seoul
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - shophub_mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:${REDIS_IMAGE_TAG:-7.4-alpine}
    container_name: shophub-redis
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes" ]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - shophub_redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  shophub_mysql_data:
  shophub_redis_data:
